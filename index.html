<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Tap - Single & Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #1e1e2f; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        
        #game-ui { text-align: center; margin-bottom: 10px; }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        .stats { font-size: 18px; font-weight: bold; }
        #time { color: #ff4757; }
        
        #game-container { 
            position: relative; width: 92vw; max-width: 500px; aspect-ratio: 1 / 1; 
        }
        
        canvas {
            width: 100%; height: 100%;
            background-color: #2f3542; border: 4px solid #ffffff; border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); cursor: crosshair; touch-action: none; 
            display: block; box-sizing: border-box;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 30, 47, 0.95); border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        .hidden { display: none !important; }

        input { padding: 10px; font-size: 18px; text-transform: uppercase; text-align: center; width: 150px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button {
            margin: 5px; padding: 12px 24px; font-size: 16px; font-weight: bold; color: white;
            background-color: #1dd1a1; border: none; border-radius: 5px; cursor: pointer; width: 200px; transition: background 0.2s;
        }
        button:hover { background-color: #10ac84; }
        button.secondary { background-color: #57606f; }
        button.secondary:hover { background-color: #2f3542; }
        button.primary { background-color: #5f27cd; font-size: 18px;}
        button.primary:hover { background-color: #341f97; }
        
        #status-text { font-size: 18px; color: #ced6e0; text-align: center; padding: 20px; line-height: 1.4; }
        #room-code-display { font-size: 36px; color: #ff9f43; font-weight: bold; letter-spacing: 2px; margin: 10px 0; }
        #turn-text { font-size: 28px; color: #ff9f43; text-align: center; padding: 0 10px; }
        
        .tutorial-text {
            font-size: 14px; color: #a4b0be; text-align: center; 
            margin-bottom: 20px; line-height: 1.5; max-width: 80%;
        }
        .divider { margin: 15px 0; font-weight: bold; color: #57606f; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>Ball Tap</h1>
        <div class="stats">
            Score: <span id="score">0</span> &nbsp;|&nbsp; 
            Time Left: <span id="time">3.0</span>s
        </div>
    </div>

    <div id="game-container">
        <!-- Main Menu -->
        <div id="menu-screen" class="overlay">
            <p class="tutorial-text">
                Tap the colored ball before time runs out!<br>
                Avoid the red decoys.
            </p>
            
            <button id="single-btn" class="primary">Play Single Player</button>
            
            <div class="divider">--- MULTIPLAYER ---</div>
            
            <button id="host-btn">Host Game</button>
            <input type="text" id="join-input" placeholder="ROOM CODE" maxlength="5" style="margin-top: 10px;">
            <button id="join-btn" class="secondary">Join Game</button>
            
            <button id="fullscreen-btn" class="secondary" style="margin-top: 20px; width: 150px; font-size: 14px;">Toggle Fullscreen</button>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="overlay hidden">
            <div id="status-text">Connecting to matchmaking server...</div>
            <div id="room-code-display" class="hidden"></div>
            <div id="waiting-text" class="hidden">Waiting for opponent to join...</div>
            <button id="cancel-btn" class="secondary" style="margin-top: 20px;">Back to Menu</button>
        </div>

        <!-- Info / Turn / Game Over Screen -->
        <div id="turn-screen" class="overlay hidden">
            <h2 id="turn-text">Opponent's Turn</h2>
            <div id="turn-subtext" style="font-size: 16px; color: #ced6e0; margin-bottom: 15px;"></div>
            <button id="rematch-btn" class="hidden">Play Again</button>
            <button id="back-menu-btn" class="secondary hidden">Back to Menu</button>
        </div>

        <canvas id="gameCanvas" width="500" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        
        const menuScreen = document.getElementById('menu-screen');
        const lobbyScreen = document.getElementById('lobby-screen');
        const turnScreen = document.getElementById('turn-screen');
        const statusText = document.getElementById('status-text');
        const roomCodeDisplay = document.getElementById('room-code-display');
        const waitingText = document.getElementById('waiting-text');
        const turnText = document.getElementById('turn-text');
        const turnSubtext = document.getElementById('turn-subtext');
        const rematchBtn = document.getElementById('rematch-btn');
        const backMenuBtn = document.getElementById('back-menu-btn');

        // Multiplayer / Mode Variables
        let peer, connection, connectionTimeout;
        let myId = Math.random().toString(36).substring(2, 7).toUpperCase(); 
        let isHost = false;
        let isSinglePlayer = false;
        
        // Game State Variables
        let score = 0;
        let myTurn = false;
        let gameRunning = false;
        let gameOver = false;
        let lastTapTime = Date.now();
        let currentTimeLimit = 3000;
        let animationId;
        
        // Visuals / Entity Arrays
        let particles = [], trails = [], decoys = [], floatingTexts = [];
        let shakeFrames = 0;
        let ball = { x: 250, y: 250, r: 30, dx: 3, dy: 3 };

        // --- SAFE SOUND SETUP (Prevents Browser Crashes) ---
        let audioCtx;
        function initAudio() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return; // Silent mode if not supported
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) {
                console.warn("Audio disabled or blocked by browser.");
            }
        }

        function playSound(type) {
            try {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'tap') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600 + (score * 20), now); 
                    osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
                    gainNode.gain.setValueAtTime(0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'lose') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
                    gainNode.gain.setValueAtTime(0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                }
            } catch (e) {} // Catch any playback errors harmlessly
        }

        // --- UI NAVIGATION ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.log(err));
            else document.exitFullscreen();
        });

        document.getElementById('cancel-btn').addEventListener('click', () => location.reload());
        backMenuBtn.addEventListener('click', () => location.reload());

        // --- SINGLE PLAYER SETUP ---
        document.getElementById('single-btn').addEventListener('click', () => {
            initAudio();
            isSinglePlayer = true;
            menuScreen.classList.add('hidden');
            initiateStartGame(true);
        });

        // --- MULTIPLAYER SETUP ---
        document.getElementById('host-btn').addEventListener('click', () => {
            initAudio(); 
            isSinglePlayer = false; isHost = true;
            menuScreen.classList.add('hidden'); lobbyScreen.classList.remove('hidden');
            statusText.innerHTML = "Connecting to matchmaking server...<br><br><small>(This can take a moment)</small>";
            
            // Server Error Fallback
            connectionTimeout = setTimeout(() => {
                handleNetworkError("Server Timeout. The public PeerJS server is currently unavailable.");
            }, 8000);

            try {
                peer = new Peer(myId);
                peer.on('open', (id) => {
                    clearTimeout(connectionTimeout);
                    statusText.innerText = "Room Created! Share this code:";
                    roomCodeDisplay.innerText = id;
                    roomCodeDisplay.classList.remove('hidden');
                    waitingText.classList.remove('hidden');
                });
                peer.on('connection', (conn) => {
                    connection = conn; setupConnection();
                    setTimeout(() => initiateStartGame(true), 1000);
                });
                peer.on('error', handleNetworkError);
            } catch (e) {
                handleNetworkError("WebRTC is blocked or not supported on this browser.");
            }
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            initAudio(); 
            const joinId = document.getElementById('join-input').value.trim().toUpperCase();
            if (joinId.length !== 5) { alert("Enter a valid 5-letter code."); return; }

            isSinglePlayer = false; isHost = false;
            menuScreen.classList.add('hidden'); lobbyScreen.classList.remove('hidden');
            statusText.innerText = "Connecting to Host...";

            connectionTimeout = setTimeout(() => {
                handleNetworkError("Could not find a host with that code.");
            }, 8000);

            try {
                peer = new Peer(); 
                peer.on('open', () => {
                    connection = peer.connect(joinId);
                    connection.on('open', () => {
                        clearTimeout(connectionTimeout);
                        setupConnection();
                        statusText.innerText = "Connected! Waiting for host to start...";
                    });
                });
                peer.on('error', handleNetworkError);
            } catch (e) {
                handleNetworkError("WebRTC is blocked or not supported on this browser.");
            }
        });

        function setupConnection() {
            connection.on('data', (data) => {
                if (data.type === 'START_GAME') initiateStartGame(false);
                else if (data.type === 'PASS_BALL') receiveBall(data.ballData, data.currentScore);
                else if (data.type === 'GAME_OVER_TIME') handleGameOver("Opponent was too slow. You Win!");
                else if (data.type === 'GAME_OVER_DECOY') handleGameOver("Opponent tapped a Fake! You Win!");
            });
            connection.on('close', () => {
                if (!gameRunning && !gameOver && lobbyScreen.classList.contains('hidden')) return;
                handleGameOver("Opponent Disconnected!");
            });
        }

        function handleNetworkError(err) {
            clearTimeout(connectionTimeout);
            console.warn(err);
            statusText.innerHTML = `<span style="color:#ff4757;">Network Error:</span><br> ${err}<br><br>Please try Single Player instead.`;
            roomCodeDisplay.classList.add('hidden');
            waitingText.classList.add('hidden');
        }

        // --- GAME LOGIC & PROGRESSION ---
        function updateDifficulty() {
            currentTimeLimit = Math.max(1000, 3000 - (score * 50));
            timeEl.innerText = (currentTimeLimit / 1000).toFixed(1);
        }

        function getBallColor(currentScore) {
            if (currentScore < 5) return '#1dd1a1'; 
            if (currentScore < 10) return '#00d2d3'; 
            if (currentScore < 15) return '#5f27cd'; 
            return '#feca57'; 
        }

        function getSafeSpawnPoint(radius, avoidList = []) {
            let x, y, safe, attempts = 0;
            do {
                safe = true;
                x = radius + Math.random() * (canvas.width - 2 * radius);
                y = radius + Math.random() * (canvas.height - 2 * radius);
                for (let item of avoidList) {
                    if (Math.hypot(x - item.x, y - item.y) < (radius + item.r + 30)) {
                        safe = false; break;
                    }
                }
                attempts++;
            } while (!safe && attempts < 100); 
            return { x, y };
        }

        function spawnDecoys(currentScore, mainBall) {
            decoys = [];
            let numDecoys = 0;
            if (currentScore >= 5) numDecoys = 1;
            if (currentScore >= 15) numDecoys = 2;
            if (currentScore >= 30) numDecoys = 3;

            for(let i=0; i<numDecoys; i++) {
                let safePos = getSafeSpawnPoint(ball.r, [...decoys, mainBall]);
                decoys.push({
                    x: safePos.x, y: safePos.y, r: ball.r,
                    dx: (Math.random() > 0.5 ? 2.5 : -2.5), dy: (Math.random() > 0.5 ? 2.5 : -2.5),
                    color: '#ff4757' 
                });
            }
        }

        // --- GAME FLOW ---
        function initiateStartGame(startingPlayer) {
            lobbyScreen.classList.add('hidden'); turnScreen.classList.remove('hidden');
            rematchBtn.classList.add('hidden'); backMenuBtn.classList.add('hidden'); turnSubtext.innerText = "";
            
            score = 0; scoreEl.innerText = score;
            trails = []; particles = []; decoys = []; floatingTexts = [];
            gameOver = false; gameRunning = false;
            updateDifficulty();

            let count = 3;
            turnText.innerText = "Game starts in: " + count;
            
            let interval = setInterval(() => {
                count--;
                if (count > 0) turnText.innerText = "Game starts in: " + count;
                else if (count === 0) turnText.innerText = "GO!";
                else { clearInterval(interval); finishStartGame(startingPlayer); }
            }, 1000);
            
            if (startingPlayer && !isSinglePlayer && connection) connection.send({ type: 'START_GAME' });
            cancelAnimationFrame(animationId);
            gameLoop();
        }

        function finishStartGame(isStartingPlayer) {
            gameRunning = true;
            
            if (isStartingPlayer || isSinglePlayer) {
                myTurn = true; turnScreen.classList.add('hidden');
                
                ball.r = 30;
                ball.x = ball.r + Math.random() * (canvas.width - 2 * ball.r);
                ball.y = ball.r + Math.random() * (canvas.height - 2 * ball.r);
                
                let initialSpeed = 3.0, angle;
                do { angle = Math.random() * Math.PI * 2; } while (Math.abs(Math.cos(angle)) < 0.2 || Math.abs(Math.sin(angle)) < 0.2);
                ball.dx = Math.cos(angle) * initialSpeed; ball.dy = Math.sin(angle) * initialSpeed;
                
                lastTapTime = Date.now(); 
            } else {
                myTurn = false; turnText.innerText = "Opponent's Turn...";
            }
        }

        function passBall() {
            playSound('tap');
            score++; scoreEl.innerText = score; updateDifficulty(); 
            floatingTexts.push({ x: ball.x, y: ball.y, text: `+${score}`, alpha: 1.0 });
            shakeFrames = 10; createExplosion(ball.x, ball.y, getBallColor(score));

            if (isSinglePlayer) {
                // Instantly teleport ball and reset for the next tap
                ball.r = Math.max(15, 30 - Math.floor(score / 4) * 2);
                let safePos = getSafeSpawnPoint(ball.r, decoys);
                ball.x = safePos.x; ball.y = safePos.y;
                
                let newSpeed = 3.0 + (Math.floor(score / 3) * 0.25);
                newSpeed = Math.min(newSpeed, 8.0);
                
                let angle;
                do { angle = Math.random() * Math.PI * 2; } while (Math.abs(Math.cos(angle)) < 0.2 || Math.abs(Math.sin(angle)) < 0.2);
                ball.dx = Math.cos(angle) * newSpeed; ball.dy = Math.sin(angle) * newSpeed;
                
                trails = []; spawnDecoys(score, ball);
                lastTapTime = Date.now(); // Reset timer for player
            } else {
                myTurn = false;
                turnScreen.classList.remove('hidden');
                turnText.innerText = "Opponent's Turn...";
                if (connection) connection.send({ type: 'PASS_BALL', ballData: ball, currentScore: score });
            }
        }

        function receiveBall(incomingBall, currentScore) {
            ball = incomingBall; score = currentScore;
            scoreEl.innerText = score; updateDifficulty();

            ball.r = Math.max(15, 30 - Math.floor(score / 4) * 2);
            let safePos = getSafeSpawnPoint(ball.r, decoys);
            ball.x = safePos.x; ball.y = safePos.y;
            
            let newSpeed = 3.0 + (Math.floor(score / 3) * 0.25);
            newSpeed = Math.min(newSpeed, 8.0);
            
            let angle;
            do { angle = Math.random() * Math.PI * 2; } while (Math.abs(Math.cos(angle)) < 0.2 || Math.abs(Math.sin(angle)) < 0.2);
            ball.dx = Math.cos(angle) * newSpeed; ball.dy = Math.sin(angle) * newSpeed;

            trails = []; spawnDecoys(score, ball); 
            
            myTurn = true; turnScreen.classList.add('hidden');
            lastTapTime = Date.now(); 
        }

        function handleGameOver(message) {
            playSound('lose'); 
            gameRunning = false; gameOver = true; myTurn = false; shakeFrames = 20;

            turnScreen.classList.remove('hidden');
            turnText.innerText = message;
            turnSubtext.innerText = `Final Score: ${score}`;
            
            if (isSinglePlayer || isHost) {
                rematchBtn.classList.remove('hidden');
            } else {
                turnSubtext.innerText += "\n(Waiting for Host to Rematch...)";
                rematchBtn.classList.add('hidden');
            }
            backMenuBtn.classList.remove('hidden');
        }

        rematchBtn.addEventListener('click', () => initiateStartGame(true));

        // --- UPDATE & DRAW ---
        function createExplosion(x, y, color) {
            for(let i=0;
