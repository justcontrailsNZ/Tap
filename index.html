<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Ball Tap</title>
    <!-- Import PeerJS for purely front-end multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1e2f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-ui { text-align: center; margin-bottom: 15px; }
        h1 { margin: 0 0 10px 0; font-size: 26px; }
        .stats { font-size: 18px; font-weight: bold; }
        #time { color: #ff4757; }
        
        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        canvas {
            background-color: #2f3542;
            border: 4px solid #ffffff;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            touch-action: none;
            display: block;
        }

        /* Overlay Menus */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 30, 47, 0.95);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .hidden { display: none !important; }

        input {
            padding: 10px;
            font-size: 18px;
            text-transform: uppercase;
            text-align: center;
            width: 150px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            margin: 5px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #1dd1a1;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 200px;
            transition: background 0.2s;
        }
        button:hover { background-color: #10ac84; }
        button.secondary { background-color: #57606f; }
        button.secondary:hover { background-color: #2f3542; }
        
        #status-text { font-size: 20px; color: #ced6e0; text-align: center; padding: 20px;}
        #room-code-display { font-size: 32px; color: #ff9f43; font-weight: bold; letter-spacing: 2px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>Multiplayer Ball Tap</h1>
        <div class="stats">
            Volleys: <span id="score">0</span> &nbsp;|&nbsp; 
            Time Left: <span id="time">3.0</span>s
        </div>
    </div>

    <div id="game-container">
        
        <!-- Main Menu -->
        <div id="menu-screen" class="overlay">
            <button id="host-btn">Host Game</button>
            <div style="margin: 15px 0;">-- OR --</div>
            <input type="text" id="join-input" placeholder="ROOM CODE" maxlength="5">
            <button id="join-btn" class="secondary">Join Game</button>
        </div>

        <!-- Lobby / Waiting Screen -->
        <div id="lobby-screen" class="overlay hidden">
            <div id="status-text">Connecting to server...</div>
            <div id="room-code-display" class="hidden"></div>
            <div id="waiting-text" class="hidden">Waiting for opponent to join...</div>
        </div>

        <!-- Turn Indicator Screen -->
        <div id="turn-screen" class="overlay hidden">
            <h2 id="turn-text" style="color: #ff9f43;">Opponent's Turn</h2>
        </div>

        <!-- The Game -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        
        // UI Screens
        const menuScreen = document.getElementById('menu-screen');
        const lobbyScreen = document.getElementById('lobby-screen');
        const turnScreen = document.getElementById('turn-screen');
        const statusText = document.getElementById('status-text');
        const roomCodeDisplay = document.getElementById('room-code-display');
        const waitingText = document.getElementById('waiting-text');
        const turnText = document.getElementById('turn-text');

        // Multiplayer Variables
        let peer;
        let connection;
        let myId = Math.random().toString(36).substring(2, 7).toUpperCase(); // 5-letter random code
        
        // Game state variables
        let score = 0;
        let myTurn = false;
        let gameRunning = false;
        let gameOver = false;
        let lastTapTime = Date.now();
        let animationId;
        const TIME_LIMIT = 3000; 

        // Ball object
        let ball = {
            x: 200, y: 200, r: 25,
            dx: 3, dy: 3,
            speedMultiplier: 1.05
        };

        // --- MULTIPLAYER NETWORKING (PeerJS) ---
        
        // Host Game
        document.getElementById('host-btn').addEventListener('click', () => {
            menuScreen.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            
            peer = new Peer(myId);
            
            peer.on('open', (id) => {
                statusText.innerText = "Room Created! Share this code:";
                roomCodeDisplay.innerText = id;
                roomCodeDisplay.classList.remove('hidden');
                waitingText.classList.remove('hidden');
            });

            // When player 2 joins
            peer.on('connection', (conn) => {
                connection = conn;
                setupConnection();
                // Host starts the game
                setTimeout(() => {
                    startGame(true); // Host gets first turn
                    connection.send({ type: 'START_GAME' });
                }, 1000);
            });
        });

        // Join Game
        document.getElementById('join-btn').addEventListener('click', () => {
            const joinId = document.getElementById('join-input').value.trim().toUpperCase();
            if (joinId.length !== 5) { alert("Please enter a valid 5-letter code."); return; }

            menuScreen.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            statusText.innerText = "Connecting to Host...";

            peer = new Peer(); // Joiner gets random ID
            
            peer.on('open', () => {
                connection = peer.connect(joinId);
                connection.on('open', () => {
                    setupConnection();
                    statusText.innerText = "Connected! Waiting for host to start...";
                });
                connection.on('error', () => alert('Connection failed.'));
            });
        });

        function setupConnection() {
            connection.on('data', (data) => {
                if (data.type === 'START_GAME') {
                    startGame(false); // Joiner waits for first turn
                }
                else if (data.type === 'PASS_BALL') {
                    receiveBall(data.ballData, data.currentScore);
                }
                else if (data.type === 'GAME_OVER') {
                    handleGameOver("You Win! Opponent missed the ball.");
                }
            });
        }

        // --- GAME LOGIC ---

        function startGame(isStartingPlayer) {
            lobbyScreen.classList.add('hidden');
            score = 0;
            scoreEl.innerText = score;
            gameOver = false;
            gameRunning = true;
            
            if (isStartingPlayer) {
                myTurn = true;
                turnScreen.classList.add('hidden');
                // Setup default ball
                ball.x = canvas.width / 2; ball.y = canvas.height / 2;
                ball.dx = (Math.random() > 0.5 ? 3 : -3);
                ball.dy = (Math.random() > 0.5 ? 3 : -3);
                lastTapTime = Date.now();
            } else {
                myTurn = false;
                turnScreen.classList.remove('hidden');
                turnText.innerText = "Opponent's Turn...";
            }

            cancelAnimationFrame(animationId);
            gameLoop();
        }

        function passBall() {
            myTurn = false;
            score++;
            scoreEl.innerText = score;
            
            // Speed up the ball
            ball.dx *= ball.speedMultiplier;
            ball.dy *= ball.speedMultiplier;

            // Show waiting screen
            turnScreen.classList.remove('hidden');
            turnText.innerText = "Opponent's Turn...";
            
            // Send ball data to opponent
            connection.send({
                type: 'PASS_BALL',
                ballData: ball,
                currentScore: score
            });
        }

        function receiveBall(incomingBall, currentScore) {
            ball = incomingBall; // Sync ball speed
            
            // Spawn ball in center to be fair
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            score = currentScore;
            scoreEl.innerText = score;
            
            myTurn = true;
            turnScreen.classList.add('hidden');
            lastTapTime = Date.now(); // Start the 3 second timer
        }

        function handleGameOver(message) {
            gameRunning = false;
            gameOver = true;
            turnScreen.classList.remove('hidden');
            turnText.innerText = message;
            
            // Auto restart to menu after 4 seconds
            setTimeout(() => {
                window.location.reload(); 
            }, 4000);
        }

        function update() {
            if (!gameRunning || !myTurn) return;

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            let bounced = false;

            // Bounce off walls
            if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx *= -1; bounced = true; }
            else if (ball.x + ball.r > canvas.width) { ball.x = canvas.width - ball.r; ball.dx *= -1; bounced = true; }

            if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy *= -1; bounced = true; }
            else if (ball.y + ball.r > canvas.height) { ball.y = canvas.height - ball.r; ball.dy *= -1; bounced = true; }

            // Speed limit so it doesn't glitch through walls
            if (bounced) {
                if (Math.abs(ball.dx) < 15) ball.dx *= ball.speedMultiplier;
                if (Math.abs(ball.dy) < 15) ball.dy *= ball.speedMultiplier;
            }

            // Check timer
            let timeLeft = TIME_LIMIT - (Date.now() - lastTapTime);
            if (timeLeft <= 0) {
                timeLeft = 0;
                connection.send({ type: 'GAME_OVER' });
                handleGameOver("You Lose! Too slow!");
            }
            timeEl.innerText = (timeLeft / 1000).toFixed(1);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (myTurn && gameRunning) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fillStyle = '#1dd1a1';
                ctx.fill();
                ctx.closePath();
            }
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // Tap Logic
        function handleInput(clientX, clientY) {
            if (!gameRunning || !myTurn) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;
            const dist = Math.hypot(mouseX - ball.x, mouseY - ball.y);
            
            // Successful tap!
            if (dist <= ball.r) {
                passBall();
            }
        }

        canvas.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        });
    </script>
</body>
</html>
