<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Ball Tap - Balanced & Juiced</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #1e1e2f; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;
            
            /* IMPROVEMENT 6: Prevent text selection/highlighting on mobile when furiously tapping */
            user-select: none;
            -webkit-user-select: none;
        }
        
        #game-ui { text-align: center; margin-bottom: 10px; }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        .stats { font-size: 18px; font-weight: bold; }
        #time { color: #ff4757; }
        
        /* RESPONSIVE CONTAINER */
        #game-container { 
            position: relative; 
            width: 92vw; 
            max-width: 500px; 
            aspect-ratio: 1 / 1; 
        }
        
        /* CANVAS STYLES */
        canvas {
            width: 100%; 
            height: 100%;
            background-color: #2f3542; border: 4px solid #ffffff; border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); cursor: crosshair; touch-action: none; 
            display: block; box-sizing: border-box;
        }

        /* Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 30, 47, 0.95); border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        .hidden { display: none !important; }

        input { padding: 10px; font-size: 18px; text-transform: uppercase; text-align: center; width: 150px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button {
            margin: 5px; padding: 12px 24px; font-size: 16px; font-weight: bold; color: white;
            background-color: #1dd1a1; border: none; border-radius: 5px; cursor: pointer; width: 200px; transition: background 0.2s;
        }
        button:hover { background-color: #10ac84; }
        button.secondary { background-color: #57606f; }
        button.secondary:hover { background-color: #2f3542; }
        
        #status-text { font-size: 20px; color: #ced6e0; text-align: center; padding: 20px;}
        #room-code-display { font-size: 36px; color: #ff9f43; font-weight: bold; letter-spacing: 2px; margin: 10px 0; }
        #turn-text { font-size: 28px; color: #ff9f43; text-align: center; padding: 0 10px; }
        
        /* IMPROVEMENT 6: Tutorial Text styling */
        .tutorial-text {
            font-size: 14px; color: #a4b0be; text-align: center; 
            margin-bottom: 20px; line-height: 1.5; max-width: 80%;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>Multiplayer Ball Tap</h1>
        <div class="stats">
            Volleys: <span id="score">0</span> &nbsp;|&nbsp; 
            Time Left: <span id="time">3.0</span>s
        </div>
    </div>

    <div id="game-container">
        <!-- Main Menu -->
        <div id="menu-screen" class="overlay">
            <!-- IMPROVEMENT 6: Added Tutorial Text -->
            <p class="tutorial-text">
                <strong>How to play:</strong><br>
                Tap the colored ball before time runs out!<br>
                Avoid the red decoys. The timer speeds up as you score.
            </p>
            <button id="host-btn">Host Game</button>
            <div style="margin: 15px 0;">-- OR --</div>
            <input type="text" id="join-input" placeholder="ROOM CODE" maxlength="5">
            <button id="join-btn" class="secondary">Join Game</button>
            <button id="fullscreen-btn" class="secondary" style="margin-top: 20px; width: 150px; font-size: 14px;">Toggle Fullscreen</button>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="overlay hidden">
            <div id="status-text">Connecting...</div>
            <div id="room-code-display" class="hidden"></div>
            <div id="waiting-text" class="hidden">Waiting for opponent to join...</div>
        </div>

        <!-- Info / Turn / Game Over Screen -->
        <div id="turn-screen" class="overlay hidden">
            <h2 id="turn-text">Opponent's Turn</h2>
            <button id="rematch-btn" class="hidden">Play Again (Rematch)</button>
        </div>

        <canvas id="gameCanvas" width="500" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        
        const menuScreen = document.getElementById('menu-screen');
        const lobbyScreen = document.getElementById('lobby-screen');
        const turnScreen = document.getElementById('turn-screen');
        const statusText = document.getElementById('status-text');
        const roomCodeDisplay = document.getElementById('room-code-display');
        const waitingText = document.getElementById('waiting-text');
        const turnText = document.getElementById('turn-text');
        const rematchBtn = document.getElementById('rematch-btn');

        // Multiplayer Networking Variables
        let peer, connection;
        let myId = Math.random().toString(36).substring(2, 7).toUpperCase(); 
        let isHost = false;
        
        // Game State Variables
        let score = 0;
        let myTurn = false;
        let gameRunning = false;
        let gameOver = false;
        let lastTapTime = Date.now();
        let currentTimeLimit = 3000; // IMPROVEMENT 6: Dynamic Difficulty
        let animationId;
        
        // Visuals / Entity Arrays
        let particles = [];
        let trails = [];
        let decoys = [];
        let floatingTexts = []; // IMPROVEMENT 5: Floating text array
        let shakeFrames = 0;

        let ball = { x: 250, y: 250, r: 30, dx: 3, dy: 3 };

        // IMPROVEMENT 1: Sound Synthesis Setup
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;

            if (type === 'tap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600 + (score * 20), now); // Pitch rises with score
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        // --- FULLSCREEN LOGIC ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });

        // --- MULTIPLAYER SETUP ---
        document.getElementById('host-btn').addEventListener('click', () => {
            initAudio(); // Initialize audio context on user interaction
            isHost = true;
            menuScreen.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            
            peer = new Peer(myId);
            peer.on('open', (id) => {
                statusText.innerText = "Room Created! Share this code:";
                roomCodeDisplay.innerText = id;
                roomCodeDisplay.classList.remove('hidden');
                waitingText.classList.remove('hidden');
            });

            peer.on('connection', (conn) => {
                connection = conn;
                setupConnection();
                setTimeout(() => initiateStartGame(true), 1000);
            });
            peer.on('error', handleDisconnect);
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            initAudio(); // Initialize audio context on user interaction
            const joinId = document.getElementById('join-input').value.trim().toUpperCase();
            if (joinId.length !== 5) { alert("Enter a valid 5-letter code."); return; }

            isHost = false;
            menuScreen.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            statusText.innerText = "Connecting to Host...";

            peer = new Peer(); 
            peer.on('open', () => {
                connection = peer.connect(joinId);
                connection.on('open', () => {
                    setupConnection();
                    statusText.innerText = "Connected! Waiting for host to start...";
                });
            });
            peer.on('error', handleDisconnect);
        });

        function setupConnection() {
            connection.on('data', (data) => {
                if (data.type === 'START_GAME') initiateStartGame(false);
                else if (data.type === 'PASS_BALL') receiveBall(data.ballData, data.currentScore);
                else if (data.type === 'GAME_OVER_TIME') handleGameOver("You Win! Opponent was too slow.");
                else if (data.type === 'GAME_OVER_DECOY') handleGameOver("You Win! Opponent tapped a Fake Ball!");
            });

            // IMPROVEMENT 4: Handle Opponent Disconnects gracefully
            connection.on('close', handleDisconnect);
        }

        function handleDisconnect() {
            if (!gameRunning && !gameOver && lobbyScreen.classList.contains('hidden')) return;
            handleGameOver("Opponent Disconnected!");
            rematchBtn.classList.add('hidden'); 
            
            if (!document.getElementById('back-btn')) {
                const backBtn = document.createElement('button');
                backBtn.id = 'back-btn';
                backBtn.innerText = "Back to Menu";
                backBtn.onclick = () => location.reload();
                turnText.appendChild(document.createElement('br'));
                turnText.appendChild(backBtn);
            }
        }

        // --- GAME LOGIC & PROGRESSION ---

        // IMPROVEMENT 6: Dynamic Difficulty updates the timer length based on score
        function updateDifficulty() {
            currentTimeLimit = Math.max(1000, 3000 - (score * 50));
            timeEl.innerText = (currentTimeLimit / 1000).toFixed(1);
        }

        function getBallColor(currentScore) {
            if (currentScore < 5) return '#1dd1a1'; 
            if (currentScore < 10) return '#00d2d3'; 
            if (currentScore < 15) return '#5f27cd'; 
            return '#feca57'; 
        }

        // IMPROVEMENT 3: Safe Spawning Helper Function
        function getSafeSpawnPoint(radius, avoidList = []) {
            let x, y, safe;
            let attempts = 0;
            do {
                safe = true;
                x = radius + Math.random() * (canvas.width - 2 * radius);
                y = radius + Math.random() * (canvas.height - 2 * radius);
                
                for (let item of avoidList) {
                    // Check if newly generated coords overlap with existing entities (with a buffer)
                    if (Math.hypot(x - item.x, y - item.y) < (radius + item.r + 30)) {
                        safe = false; 
                        break;
                    }
                }
                attempts++;
            } while (!safe && attempts < 100); // Max 100 attempts to avoid infinite loops
            return { x, y };
        }

        function spawnDecoys(currentScore, mainBall) {
            decoys = [];
            let numDecoys = 0;
            if (currentScore >= 5) numDecoys = 1;
            if (currentScore >= 15) numDecoys = 2;

            for(let i=0; i<numDecoys; i++) {
                // Determine a location that avoids the main ball and previously placed decoys
                let avoidList = [...decoys, mainBall];
                let safePos = getSafeSpawnPoint(ball.r, avoidList);
                
                decoys.push({
                    x: safePos.x, y: safePos.y, r: ball.r,
                    dx: (Math.random() > 0.5 ? 2.5 : -2.5), 
                    dy: (Math.random() > 0.5 ? 2.5 : -2.5),
                    color: '#ff4757' 
                });
            }
        }

        // --- GAME FLOW ---

        function initiateStartGame(startingPlayer) {
            lobbyScreen.classList.add('hidden');
            turnScreen.classList.remove('hidden');
            rematchBtn.classList.add('hidden');
            
            score = 0; scoreEl.innerText = score;
            trails = []; particles = []; decoys = []; floatingTexts = [];
            gameOver = false; gameRunning = false;
            updateDifficulty();

            let count = 3;
            turnText.innerText = "Game starts in: " + count;
            
            let interval = setInterval(() => {
                count--;
                if (count > 0) {
                    turnText.innerText = "Game starts in: " + count;
                } else if (count === 0) {
                    turnText.innerText = "GO!";
                } else {
                    clearInterval(interval);
                    finishStartGame(startingPlayer);
                }
            }, 1000);
            
            if (startingPlayer) connection.send({ type: 'START_GAME' });
            cancelAnimationFrame(animationId);
            gameLoop();
        }

        function finishStartGame(isStartingPlayer) {
            gameRunning = true;
            
            if (isStartingPlayer) {
                myTurn = true;
                turnScreen.classList.add('hidden');
                
                ball.r = 30;
                ball.x = ball.r + Math.random() * (canvas.width - 2 * ball.r);
                ball.y = ball.r + Math.random() * (canvas.height - 2 * ball.r);
                
                let initialSpeed = 3.0;
                let angle;
                do { angle = Math.random() * Math.PI * 2; } 
                while (Math.abs(Math.cos(angle)) < 0.2 || Math.abs(Math.sin(angle)) < 0.2);
                
                ball.dx = Math.cos(angle) * initialSpeed;
                ball.dy = Math.sin(angle) * initialSpeed;
                
                lastTapTime = Date.now(); 
            } else {
                myTurn = false;
                turnText.innerText = "Opponent's Turn...";
            }
        }

        function passBall() {
            playSound('tap'); // SOUND IMPROVEMENT
            myTurn = false;
            score++; scoreEl.innerText = score;
            updateDifficulty(); 
            
            // IMPROVEMENT 5: Add Floating Text
            floatingTexts.push({ x: ball.x, y: ball.y, text: `+${score}`, alpha: 1.0 });
            
            shakeFrames = 10;
            createExplosion(ball.x, ball.y, getBallColor(score));

            turnScreen.classList.remove('hidden');
            turnText.innerText = "Opponent's Turn...";
            
            connection.send({ type: 'PASS_BALL', ballData: ball, currentScore: score });
        }

        function receiveBall(incomingBall, currentScore) {
            ball = incomingBall; 
            score = currentScore;
            scoreEl.innerText = score;
            updateDifficulty();

            ball.r = Math.max(15, 30 - Math.floor(score / 4) * 2);
            
            // Randomize ball location 
            ball.x = ball.r + Math.random() * (canvas.width - 2 * ball.r);
            ball.y = ball.r + Math.random() * (canvas.height - 2 * ball.r);
            
            let newSpeed = 3.0 + (Math.floor(score / 3) * 0.25);
            newSpeed = Math.min(newSpeed, 8.0);
            
            let angle;
            do {
                angle = Math.random() * Math.PI * 2;
            } while (Math.abs(Math.cos(angle)) < 0.2 || Math.abs(Math.sin(angle)) < 0.2);

            ball.dx = Math.cos(angle) * newSpeed;
            ball.dy = Math.sin(angle) * newSpeed;

            trails = []; 
            spawnDecoys(score, ball); // Safe spawning passes ball state
            
            myTurn = true;
            turnScreen.classList.add('hidden');
            lastTapTime = Date.now(); 
        }

        function handleGameOver(message) {
            playSound('lose'); // SOUND IMPROVEMENT
            gameRunning = false; gameOver = true; myTurn = false;
            shakeFrames = 20;

            turnScreen.classList.remove('hidden');
            turnText.innerText = message;
            
            if (isHost) {
                rematchBtn.classList.remove('hidden');
            } else {
                let p = document.createElement('p');
                p.innerText = "(Waiting for Host to Rematch...)";
                p.style.fontSize = "16px"; p.style.color = "#ced6e0";
                turnText.appendChild(p);
            }
        }

        rematchBtn.addEventListener('click', () => {
            initiateStartGame(true);
        });

        // --- UPDATE & DRAW ---

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                    alpha: 1, color: color, size: Math.random()*5 + 3
                });
            }
        }

        function update() {
            for(let i = particles.length-1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= 0.03;
                if(p.alpha <= 0) particles.splice(i, 1);
            }

            // Update floating texts
            floatingTexts.forEach(ft => { ft.y -= 2; ft.alpha -= 0.02; });
            floatingTexts = floatingTexts.filter(ft => ft.alpha > 0);

            if (!gameRunning || !myTurn) return;

            let timeLeft = currentTimeLimit - (Date.now() - lastTapTime);
            if (timeLeft <= 0) {
                timeLeft = 0;
                connection.send({ type: 'GAME_OVER_TIME' });
                handleGameOver("You Lose! Too slow!");
            }
            timeEl.innerText = (timeLeft / 1000).toFixed(1);

            // Move Ball
            ball.x += ball.dx; ball.y += ball.dy;
            
            // Record Trail
            trails.push({x: ball.x, y: ball.y, r: ball.r, alpha: 0.4});
            if (trails.length > 8) trails.shift();
            trails.forEach(t => t.alpha -= 0.05);

            // Bounce Main Ball
            if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx *= -1; shakeFrames = 4; }
            else if (ball.x + ball.r > canvas.width) { ball.x = canvas.width - ball.r; ball.dx *= -1; shakeFrames = 4; }
            if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy *= -1; shakeFrames
